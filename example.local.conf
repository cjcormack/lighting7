database {
    # SQLite database file. Empty string = use the default
    # `<appDataDir>/lighting7.db` (resolved per-OS by AppDataDir.kt).
    path = ""
}

compilerServer {
    # URL of the kotlin-compiler-server used by the in-app script editor.
    url = "http://localhost:8321/"
}

frontend {
    # Path to a built React `dist/` directory. Empty = serve the React bundle
    # baked into the JAR's classpath at /static/ (see Gradle copyFrontend task).
    staticPath = ""
}

mdns {
    # Advertise the backend over Bonjour / DNS-SD so iPad and desktop clients
    # reach it at `lighting7-<hostname>.local:8413` without entering an IP.
    # Set to false to disable (e.g. on a machine with a non-mDNS network).
    enabled = true

    # Service name. Empty = derive from the local hostname (`lighting7-<host>`).
    # Override if you run multiple lighting7 instances on the same LAN.
    name = ""
}

sync {
    # Root for cloud-sync working trees. Each project gets its own per-UUID
    # repo at `<workingTreeRoot>/{projectUuid}/repo/`. Empty = `<appDataDir>/sync`.
    workingTreeRoot = ""

    # Where to store GitHub Personal Access Tokens used for remote push/pull.
    # "keychain" uses the OS native keystore (macOS Security framework / libsecret /
    # Windows Credential Manager) via JNA. "file" falls back to an AES-GCM-encrypted
    # JSON blob under `<appDataDir>/credentials.enc`, encrypted with a key derived
    # from the install UUID + hostname. The file fallback is meant for headless
    # Linux installs that don't have libsecret available; on macOS / desktop Linux /
    # Windows, prefer "keychain".
    credentialStore = "keychain"

    oauth {
        # GitHub App credentials for the in-UI "Connect GitHub" flow. Register an
        # App at https://github.com/settings/apps/new with permissions
        # "Contents: Read & write", "Metadata: Read-only" and (for create-new-repo)
        # "Administration: Read & write". Enable "Request user authorization (OAuth)
        # during installation" and "Enable Device Flow". Set the Callback URL to
        # `${publicBaseUrl}/api/oauth/github/callback`. Webhooks: off.
        #
        # An empty `clientId` disables the OAuth flow entirely — the UI then offers
        # only the Advanced/PAT path. `clientSecret` is sensitive; treat this file
        # like any other secret config (it is gitignored by default).
        github {
            clientId     = ""
            clientSecret = ""

            # Public URL the user's browser hits to reach this lighting7 install.
            # `/api/rest/oauth/github/callback` is appended when constructing the
            # OAuth redirect — register exactly that URL as the GitHub App's
            # Callback URL. Empty = "http://localhost:8413". Override for
            # LAN-accessed rigs or reverse-proxy deployments.
            publicBaseUrl = ""
        }
    }
}
