name: Windows build

# Manual-only. Produces a Windows x86_64 .msi installer via `gradlew packageWindows`.
# When dispatched against a `v*` tag with create_release=true, also publishes a
# GitHub Release with the .msi attached.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Installer version (passed to -PjpackageAppVersion). Ignored if dispatched against a v* tag — tag name minus the 'v' is used instead."
        type: string
        default: "1.0.0"
      create_release:
        description: "Create/update a GitHub Release with the .msi attached. Only honored when dispatched against a v* tag."
        type: boolean
        default: false
      kotlin_compiler_server_ref:
        description: "Ref (tag/branch/commit) of JetBrains/kotlin-compiler-server to check out. The build's sed patches assume a 2.1.21-compatible tree."
        type: string
        default: "2.1.21"

concurrency:
  group: windows-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout lighting7
        uses: actions/checkout@v4

      - name: Checkout lighting-react
        uses: actions/checkout@v4
        with:
          repository: cjcormack/lighting-react
          path: lighting-react

      - name: Checkout kotlin-compiler-server
        uses: actions/checkout@v4
        with:
          repository: JetBrains/kotlin-compiler-server
          ref: ${{ inputs.kotlin_compiler_server_ref }}
          path: kotlin-compiler-server

      # JDK 24 is the primary JDK for the lighting7 build (Liberica ships `jmods/`,
      # which Temurin's Windows distribution does not, and `jlink` needs them).
      # JDK 17 is required by the kotlin-compiler-server fork's daemon JVM
      # (pinned in its gradle/gradle-daemon-jvm.properties).
      - name: Set up JDKs (17 + 24, Liberica)
        uses: actions/setup-java@v4
        with:
          distribution: liberica
          java-version: |
            17
            24

      - name: Verify jmods are present (JDK 24)
        shell: pwsh
        run: |
          $jmodsPath = Join-Path $env:JAVA_HOME "jmods"
          if (-not (Test-Path $jmodsPath)) {
            Write-Host "::error::jmods/ not found at $jmodsPath — jlink will fail. JAVA_HOME contents:"
            Get-ChildItem $env:JAVA_HOME
            exit 1
          }
          Write-Host "jmods/ found at $jmodsPath."

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # The kotlin-compiler-server fork's daemon JVM resolver needs to find the
      # JDK 17 install. Hosted-toolcache paths aren't in Gradle's default JDK
      # discovery list, so point at them via env vars set by setup-java.
      - name: Register JDK install paths for Gradle toolchain discovery
        shell: pwsh
        run: |
          $propsFile = Join-Path $env:USERPROFILE ".gradle\gradle.properties"
          New-Item -ItemType Directory -Force -Path (Split-Path $propsFile) | Out-Null
          Add-Content -Path $propsFile -Value "org.gradle.java.installations.fromEnv=JAVA_HOME_17_X64,JAVA_HOME_24_X64"
          Get-Content $propsFile

      - name: Resolve effective installer version
        shell: pwsh
        run: |
          $refName = "${{ github.ref_name }}"
          $isTag = "${{ github.ref_type }}" -eq "tag" -and $refName.StartsWith("v")
          if ($isTag) {
            $version = $refName.Substring(1)
            Write-Host "Tag dispatch detected; using version '$version' from tag (input version ignored)."
          } else {
            $version = "${{ inputs.version }}"
            Write-Host "Non-tag dispatch; using version '$version' from input."
            if ("${{ inputs.create_release }}" -eq "true") {
              Write-Host "::warning::create_release=true was set but ref is not a v* tag; the Release step will be skipped."
            }
          }
          "EFFECTIVE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build Windows MSI
        shell: pwsh
        run: |
          .\gradlew.bat packageWindows `
            "-PlightingReactPath=./lighting-react" `
            "-PkotlinCompilerServerPath=./kotlin-compiler-server" `
            "-PjpackageAppVersion=$env:EFFECTIVE_VERSION" `
            --no-daemon --stacktrace

      - name: Upload .msi as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: lighting7-windows-msi
          path: build/installers/*.msi
          retention-days: 30
          if-no-files-found: error

      - name: Publish GitHub Release (tag dispatches only)
        if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v') && inputs.create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: build/installers/*.msi
          draft: true
          fail_on_unmatched_files: true
